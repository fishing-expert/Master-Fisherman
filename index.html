<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fishing Trip Planner</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0284c7;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary);
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus, select:focus {
            border-color: var(--secondary);
        }
        button {
            width: 100%;
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgb(2 132 199 / 0.3);
        }
        button:active {
            background-color: var(--primary);
        }
        .info-box {
            background-color: #f0f9ff;
            border-left: 4px solid var(--secondary);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎣 Fishing Trip Planner</h1>
    
    <div class="card">
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" placeholder="e.g., Gibraltar, MI" value="">
        </div>

        <div class="form-group">
            <label for="date">Trip Date</label>
            <input type="date" id="date" value="">
        </div>

        <div class="form-group">
            <label for="fish">Target Fish Species</label>
            <select id="fish">
                <option value="" disabled selected>Select a species...</option>
                <option value="Walleye">Walleye</option>
                <option value="Trout">Trout</option>
                <option value="Salmon">Salmon</option>
                <option value="Bass">Bass</option>
                <option value="Pike">Pike</option>
            </select>
        </div>

        <button onclick="generateAndDownloadIcs()">Download iOS Calendar File</button>
        
        <div class="info-box">
            <strong>iPhone Setup Note:</strong> Once downloaded, tap the <code>.ics</code> file to add it straight to your iOS Calendar. The links in your event notes will appear as masked friendly text links.
        </div>
    </div>
</div>

<script>
function generateAndDownloadIcs() {
    const locationName = document.getElementById('location').value.trim();
    const dateValue = document.getElementById('date').value;
    const targetFish = document.getElementById('fish').value;

    if (!locationName || !dateValue || !targetFish) {
        alert("Please complete all form fields before generating your trip file.");
        return;
    }

    // Standardized Mock Data Injection based on inputs
    const cleanDateStr = dateValue.replace(/-/g, "");
    const mapUrl = `https://maps.apple.com/?q=${encodeURIComponent(locationName + " Boat Launch")}`;
    const facebookUrl = `https://www.facebook.com/search/groups/?q=${encodeURIComponent(locationName + " Fishing")}`;
    const guideUrl = `https://www.google.com/search?q=${encodeURIComponent(locationName + " fishing guides reports")}`;
    const redditUrl = `https://www.reddit.com/r/fishing/search/?q=${encodeURIComponent(locationName)}`;

    const locationLabel = "Launch Site Map";
    const fbLabel = "Local Facebook Fishing Groups";
    const guideLabel = "Local Guide & Scouting Reports";
    const redditLabel = "Reddit Fishing Intel";

    // 1. Plain Text Fallback Description (Required for system validations)
    const plainDescription = `Trip Details for ${targetFish} in ${locationName}.\n\n` +
        `${locationLabel}: ${mapUrl}\n` +
        `${fbLabel}: ${facebookUrl}\n` +
        `${guideLabel}: ${guideUrl}\n` +
        `${redditLabel}: ${redditUrl}`;

    // 2. Rich HTML Description enabling friendly text masks on Apple Calendar
    const htmlDescription = `<!DOCTYPE html><html><body>` +
        `<p><strong>Trip Details for ${targetFish} in ${locationName}</strong></p>` +
        `<p>🔗 <a href="${mapUrl}">${locationLabel}</a></p>` +
        `<p>👥 <a href="${facebookUrl}">${fbLabel}</a></p>` +
        `<p>🎣 <a href="${guideUrl}">${guideLabel}</a></p>` +
        `<p>🤖 <a href="${redditUrl}">${redditLabel}</a></p>` +
        `</body></html>`;

    // 3. Assemble full iCalendar standards compliant array
    const icsLines = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Fishing App//Trip Planner//EN",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        "BEGIN:VEVENT",
        `UID:${Date.now()}@fishingplanner.local`,
        `DTSTAMP:${new Date().toISOString().replace(/[-:]/g, "").split(".")[0]}Z`,
        `DTSTART:${cleanDateStr}T060000`, // Default 6:00 AM trip kickoff
        `DTEND:${cleanDateStr}T180000`,   // Default 6:00 PM wrap-up
        `SUMMARY:🎣 Fishing Trip: ${targetFish} @ ${locationName}`,
        `LOCATION:${locationName}`,
        `DESCRIPTION:${plainDescription.replace(/\n/g, "\\n")}`,
        // Forces iOS Calendar view to substitute long addresses with masked names
        `X-ALT-DESC;FMTTYPE=text/html:${htmlDescription.replace(/\n/g, "")}`,
        "END:VEVENT",
        "END:VCALENDAR"
    ];

    const icsContent = icsLines.join("\r\n");

    // 4. Trigger safe browser programmatic file download
    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8;' });
    const link = document.createElement('a');
    const filename = `${locationName.replace(/[^a-z0-9]/gi, '_')}_${targetFish}.ics`;
    
    if (navigator.msSaveBlob) { 
        navigator.msSaveBlob(blob, filename);
    } else {
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
</script>

</body>
</html>
