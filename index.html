<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fishing Trip Planner</title>
    <style>
        :root {
            --primary: #1a5f7a;
            --secondary: #57c5b6;
            --dark: #159895;
            --light: #f5fdfb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: #333;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fff;
            -webkit-appearance: none;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--secondary);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(26, 95, 122, 0.2);
            transition: background-color 0.2s;
        }
        button:active {
            background-color: var(--dark);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎣 Fishing Trip Planner</h1>
    
    <form id="plannerForm" onsubmit="generateAgnosticICS(event)">
        <div class="input-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" value="" placeholder="e.g., City, State or Body of Water" required>
        </div>

        <div class="input-group">
            <label for="date">Trip Date:</label>
            <input type="date" id="date" name="date" value="" required>
        </div>

        <div class="input-group">
            <label for="species">Target Species:</label>
            <select id="species" name="species" required>
                <option value="" disabled selected hidden>Select target species...</option>
                <option value="Best Fishing Right Now">🌟 Best Fishing Right Now</option>
                <optgroup label="Trout & Salmon">
                    <option value="Brown Trout">Brown Trout</option>
                    <option value="Rainbow Trout (Steelhead)">Rainbow Trout (Steelhead)</option>
                    <option value="Brook Trout">Brook Trout</option>
                    <option value="Lake Trout">Lake Trout</option>
                    <option value="Chinook (King) Salmon">Chinook (King) Salmon</option>
                    <option value="Coho Salmon">Coho Salmon</option>
                </optgroup>
                <optgroup label="Warmwater Gamefish">
                    <option value="Walleye">Walleye</option>
                    <option value="Largemouth Bass">Largemouth Bass</option>
                    <option value="Smallmouth Bass">Smallmouth Bass</option>
                    <option value="Northern Pike">Northern Pike</option>
                    <option value="Muskellunge (Muskie)">Muskellunge (Muskie)</option>
                </optgroup>
                <optgroup label="Panfish">
                    <option value="Yellow Perch">Yellow Perch</option>
                    <option value="Bluegill">Bluegill</option>
                    <option value="Crappie">Crappie</option>
                    <option value="Rock Bass">Rock Bass</option>
                </optgroup>
            </select>
        </div>

        <button type="submit">Download Trip File (.ics)</button>
    </form>
</div>

<script>
function generateAgnosticICS(event) {
    event.preventDefault();

    // Collect dynamic form values
    const locationVal = document.getElementById('location').value.trim();
    const dateVal = document.getElementById('date').value;
    const speciesVal = document.getElementById('species').value;

    if (!locationVal || !dateVal || !speciesVal) return;

    // Standardize dates to .ics formatting
    const dateObj = new Date(dateVal);
    const year = dateObj.getUTCFullYear();
    const month = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
    const day = String(dateObj.getUTCDate()).padStart(2, '0');
    
    const formattedDate = `${year}${month}${day}`;
    const nextDayObj = new Date(dateObj);
    nextDayObj.setUTCDate(nextDayObj.getUTCDate() + 1);
    const endYear = nextDayObj.getUTCFullYear();
    const endMonth = String(nextDayObj.getUTCMonth() + 1).padStart(2, '0');
    const endDay = String(nextDayObj.getUTCDate()).padStart(2, '0');
    const formattedEndDate = `${endYear}${endMonth}${endDay}`;

    // Create agnostic clickable routing query components
    const encodedLocation = encodeURIComponent(locationVal);
    const encodedSpecies = encodeURIComponent(speciesVal);
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedLocation}+fishing`;
    const baitShopsUrl = `https://www.google.com/maps/search/?api=1&query=bait+and+tackle+near+${encodedLocation}`;

    // Universal platform-agnostic .ics markup block
    const icsContent = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Agnostic Fishing Planner//NONSGML v1.0//EN",
        "BEGIN:VEVENT",
        `DTSTART;VALUE=DATE:${formattedDate}`,
        `DTEND;VALUE=DATE:${formattedEndDate}`,
        `SUMMARY:Fishing Trip: ${speciesVal} - ${locationVal}`,
        `LOCATION:${locationVal}`,
        "DESCRIPTION:🎣 TRIP DETAILS AND STRATEGY\\n\\n" +
                    `• Target: ${speciesVal}\\n` +
                    `• Location: ${locationVal}\\n\\n` +
                    "🗺️ NAVIGATION & DIRECTORY LINKS:\\n" +
                    `• Public Access Points: ${mapsUrl}\\n` +
                    `• Bait Shops (<15 mi Radius): ${baitShopsUrl}\\n\\n` +
                    "📋 USER NOTE:\\n" +
                    "Tap your navigation links to query up-to-date regional boundaries, live moon phase data, and active baits/hatches for this seasonal window.",
        "END:VEVENT",
        "END:VCALENDAR"
    ].join("\r\n");

    // Output binary payload deployment for cross-client iPhone downloading
    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.setAttribute('download', `Fishing_${formattedDate}.ics`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
